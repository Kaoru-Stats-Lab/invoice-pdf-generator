<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3連動対応：見積・納品・請求書PDFジェネレーター（ロゴ・印鑑・値引き対応版）</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f8fafc; }
        
        .a4-page {
            width: 210mm;
            min-height: 297mm;
            padding: 20mm;
            background: white;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            box-sizing: border-box;
        }

        .preview-container {
            transform-origin: top left;
        }

        /* 透過印鑑レイアウト用の絶対配置ブレンド用 */
        .stamp-box {
            position: relative;
        }
        .stamp-img {
            mix-blend-mode: multiply;
            pointer-events: none;
        }

        @media print {
            body {
                background: white !important;
                color: black !important;
            }
            .no-print {
                display: none !important;
            }
            .preview-section {
                display: block !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            .preview-wrapper {
                width: auto !important;
                height: auto !important;
                overflow: visible !important;
            }
            .preview-container {
                transform: scale(1) !important;
                transform-origin: top left !important;
            }
            .a4-page {
                box-shadow: none !important;
                padding: 15mm !important;
                width: 210mm !important;
                min-height: 297mm !important;
            }
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col antialiased">

    <header class="no-print bg-slate-900 text-slate-100 border-b border-slate-800 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-600 text-white px-2.5 py-1 rounded-md font-bold text-sm tracking-wider">PRO</div>
                <h1 class="text-base font-bold tracking-wide">見積・納品・請求 3連動PDFジェネレーター</h1>
            </div>
            <button type="button" onclick="window.print()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 px-5 rounded-xl text-xs tracking-wider shadow-md transition-all flex items-center space-x-2 cursor-pointer">
                <span>🖨️ PDFとして保存 / 印刷</span>
            </button>
        </div>
    </header>

    <main class="w-full max-w-[1700px] mx-auto px-4 sm:px-6 lg:px-8 py-6 grid grid-cols-1 lg:grid-cols-12 gap-6 flex-1 items-start">
        
        <section class="no-print lg:col-span-6 bg-white rounded-2xl shadow-sm border border-slate-200 p-5 lg:p-6 space-y-6">
            
            <div>
                <p class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wider">📄 書類種別を選択</p>
                <div class="bg-slate-100 p-1 rounded-xl grid grid-cols-3 gap-1 border border-slate-200" role="group" aria-label="書類種別">
                    <button type="button" onclick="setDocType('estimate')" id="btn-type-estimate" class="py-2 rounded-lg text-xs font-bold text-center transition-all cursor-pointer bg-white text-slate-900 shadow-sm" aria-pressed="true">見積書</button>
                    <button type="button" onclick="setDocType('delivery')" id="btn-type-delivery" class="py-2 rounded-lg text-xs font-bold text-center transition-all cursor-pointer text-slate-500 hover:text-slate-900" aria-pressed="false">納品書</button>
                    <button type="button" onclick="setDocType('invoice')" id="btn-type-invoice" class="py-2 rounded-lg text-xs font-bold text-center transition-all cursor-pointer text-slate-500 hover:text-slate-900" aria-pressed="false">請求書</button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="in-date" class="block text-xs font-bold text-slate-600 mb-1">📅 発行日</label>
                    <input type="date" id="in-date" oninput="updatePreview()" class="w-full border border-slate-200 rounded-lg p-2 text-xs bg-slate-50 focus:bg-white outline-none focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all">
                </div>
                <div>
                    <label id="lbl-deadline" for="in-deadline" class="block text-xs font-bold text-slate-600 mb-1">⏳ 有効期限</label>
                    <input type="date" id="in-deadline" oninput="updatePreview()" class="w-full border border-slate-200 rounded-lg p-2 text-xs bg-slate-50 focus:bg-white outline-none focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all">
                </div>
                <div class="col-span-2">
                    <label id="lbl-number" for="in-number" class="block text-xs font-bold text-slate-600 mb-1">🔢 見積番号</label>
                    <input type="text" id="in-number" oninput="updatePreview()" placeholder="EST-2026-001" class="w-full border border-slate-200 rounded-lg p-2 text-xs bg-slate-50 focus:bg-white outline-none transition-all font-mono">
                </div>
                <div class="col-span-2">
                    <label for="in-title" class="block text-xs font-bold text-slate-600 mb-1">📌 件名</label>
                    <input type="text" id="in-title" oninput="updatePreview()" placeholder="システム開発プロジェクト御見積の件" class="w-full border border-slate-200 rounded-lg p-2 text-xs bg-slate-50 focus:bg-white outline-none transition-all">
                </div>
            </div>

            <div class="bg-slate-50 rounded-xl p-4 border border-slate-200 grid grid-cols-3 gap-3">
                <div class="space-y-1">
                    <label class="block text-[10px] font-bold text-slate-600">🏢 会社ロゴ</label>
                    <input type="file" id="in-logo" accept="image/*" onchange="handleImageAsset(this, 'view-logo-container', 120)" class="hidden">
                    <button type="button" onclick="document.getElementById('in-logo').click()" class="w-full bg-white hover:bg-slate-100 border border-slate-300 rounded-lg py-2 text-[10px] font-medium text-slate-700 cursor-pointer text-center truncate">画像を選択</button>
                </div>
                <div class="space-y-1">
                    <label class="block text-[10px] font-bold text-slate-600">👤 担当者印</label>
                    <input type="file" id="in-stamp-user" accept="image/*" onchange="handleImageAsset(this, 'view-stamp-user-container', 45)" class="hidden">
                    <button type="button" onclick="document.getElementById('in-stamp-user').click()" class="w-full bg-white hover:bg-slate-100 border border-slate-300 rounded-lg py-2 text-[10px] font-medium text-slate-700 cursor-pointer text-center truncate">画像を選択</button>
                </div>
                <div class="space-y-1">
                    <label class="block text-[10px] font-bold text-slate-600">🏢 会社社印</label>
                    <input type="file" id="in-stamp-comp" accept="image/*" onchange="handleImageAsset(this, 'view-stamp-comp-container', 65)" class="hidden">
                    <button type="button" onclick="document.getElementById('in-stamp-comp').click()" class="w-full bg-white hover:bg-slate-100 border border-slate-300 rounded-lg py-2 text-[10px] font-medium text-slate-700 cursor-pointer text-center truncate">画像を選択</button>
                </div>
                <p class="col-span-3 text-[9px] text-slate-400 leading-normal">※背景が透明（透過PNG）の画像を使用すると、プレビューに美しく重なります。</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 border-t border-slate-100 pt-4">
                <div class="space-y-3">
                    <h3 class="text-xs font-bold text-slate-800 border-l-2 border-indigo-600 pl-2">🏢 取引先情報（宛名）</h3>
                    <input type="text" id="in-client-name" oninput="updatePreview()" placeholder="株式会社〇〇 御中" class="w-full border border-slate-200 rounded-lg p-2 text-xs bg-slate-50 focus:bg-white outline-none">
                    <textarea id="in-client-details" oninput="updatePreview()" rows="3" placeholder="郵便番号、住所、連絡先など" class="w-full border border-slate-200 rounded-lg p-2 text-xs bg-slate-50 focus:bg-white outline-none"></textarea>
                </div>
                <div class="space-y-3">
                    <h3 class="text-xs font-bold text-slate-800 border-l-2 border-indigo-600 pl-2">✍️ 発行者情報</h3>
                    <input type="text" id="in-issuer-name" oninput="updatePreview()" placeholder="あなたの会社名・屋号" class="w-full border border-slate-200 rounded-lg p-2 text-xs bg-slate-50 focus:bg-white outline-none">
                    <textarea id="in-issuer-details" oninput="updatePreview()" rows="2" placeholder="住所、お電話番号、メールアドレス等" class="w-full border border-slate-200 rounded-lg p-2 text-xs bg-slate-50 focus:bg-white outline-none"></textarea>
                    <div>
                        <label for="in-issuer-invoice" class="block text-[10px] font-bold text-slate-500 mb-0.5">登録番号（インボイス）</label>
                        <input type="text" id="in-issuer-invoice" oninput="updatePreview()" placeholder="T1234567890123" class="w-full border border-slate-200 rounded-lg p-2 text-xs bg-slate-50 focus:bg-white outline-none font-mono">
                    </div>
                </div>
            </div>

            <div class="border-t border-slate-100 pt-4 space-y-3">
                <div class="flex justify-between items-center">
                    <h3 class="text-xs font-bold text-slate-800 border-l-2 border-indigo-600 pl-2">📊 項目明細（値引きは単価を負数に入力）</h3>
                    <button type="button" onclick="addDetailRow()" class="bg-slate-900 hover:bg-slate-800 text-white font-medium text-[11px] px-2.5 py-1 rounded-md transition-all cursor-pointer">+ 行を追加</button>
                </div>
                <div class="grid grid-cols-12 gap-2 px-2.5 text-[10px] font-bold text-slate-400 uppercase tracking-wider hidden sm:grid">
                    <div class="col-span-5">品名・内容（例: 出精値引き）</div>
                    <div class="col-span-2 text-right">数量</div>
                    <div class="col-span-2 text-right">単価（負数可）</div>
                    <div class="col-span-2 text-center">税率区分</div>
                    <div class="col-span-1"></div>
                </div>
                <div id="form-item-container" class="space-y-2 max-h-[280px] overflow-y-auto pr-1"></div>
            </div>

            <div class="bg-slate-50 border border-slate-200 text-[10px] text-slate-400 text-center rounded-xl p-3">
                <div class="font-bold text-[9px] text-slate-400 mb-1 tracking-wider">ADVERTISEMENT</div>
                <div class="border border-dashed border-slate-200 py-3 bg-white rounded-lg font-mono">Google AdSense (レスポンシブ自動最適化ディスプレイ枠)</div>
            </div>
        </section>

        <section class="preview-section lg:col-span-6 flex justify-center lg:justify-start overflow-hidden">
            <div class="preview-wrapper" id="preview-wrapper">
                <div class="preview-container" id="preview-container">
                    <div id="pdf-paper" class="a4-page flex flex-col justify-between">
                        
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                <div id="view-logo-container" class="min-h-[40px] flex items-center">
                                    </div>
                                <div class="text-right text-xs space-y-1 text-slate-500 font-mono">
                                    <p>日付: <span id="view-date" class="select-all">----/--/--</span></p>
                                    <p id="view-lbl-deadline-row">有効期限: <span id="view-deadline" class="select-all">----/--/--</span></p>
                                    <p><span id="view-num-label">見積番号</span>: <span id="view-number" class="select-all">--------</span></p>
                                </div>
                            </div>

                            <div class="border-b-2 border-slate-900 pb-2 mb-6">
                                <h2 id="view-doc-type" class="text-2xl font-bold tracking-widest text-slate-900">御見積書</h2>
                                <p id="view-title" class="text-xs font-medium text-slate-600 mt-1
